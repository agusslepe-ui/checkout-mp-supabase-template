<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remera LEMONT</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="product">
        <div class="product-media">
          <span>LEMONT</span>
        </div>

          <h1>Remera LEMONT</h1>

          <p class="price">$100</p>
          <button id="pay-button" type="button">Pagar con Mercado Pago</button>
          <p id="status-message" class="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
